<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Message Intelligence — Color Palette Sandbox</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
    background: #F5F5F5;
    color: #1a1a1a;
    padding: 40px 24px;
    -webkit-font-smoothing: antialiased;
  }
  h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
  .subtitle { font-size: 14px; color: #888; margin-bottom: 40px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 32px; }

  .palette-card {
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: default;
  }
  .palette-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.1);
  }

  .palette-header {
    padding: 24px 24px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .palette-name { font-size: 18px; font-weight: 600; }
  .palette-desc { font-size: 12px; opacity: 0.6; }
  .palette-tag {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 3px 8px;
    border-radius: 6px;
    opacity: 0.7;
  }

  .swatches {
    display: flex;
    padding: 0 24px 16px;
    gap: 8px;
  }
  .swatch {
    flex: 1;
    height: 48px;
    border-radius: 10px;
    position: relative;
    transition: transform 0.15s;
  }
  .swatch:hover { transform: scale(1.08); z-index: 1; }
  .swatch-label {
    position: absolute;
    bottom: -18px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    font-weight: 500;
    font-family: 'SF Mono', monospace;
    opacity: 0.5;
    white-space: nowrap;
  }

  .mock-ui {
    padding: 12px 24px 24px;
  }
  .mock-nav {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    border-radius: 12px;
    margin-bottom: 12px;
  }
  .mock-nav-pill {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
  }
  .mock-cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .mock-card {
    padding: 14px;
    border-radius: 12px;
    border: 1px solid;
  }
  .mock-card-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; opacity: 0.5; }
  .mock-card-value { font-size: 22px; font-weight: 700; margin-top: 4px; }
  .mock-card-sub { font-size: 10px; opacity: 0.5; margin-top: 2px; }
  .mock-bar-track { height: 6px; border-radius: 3px; margin-top: 8px; overflow: hidden; }
  .mock-bar-fill { height: 100%; border-radius: 3px; }
  .mock-chat {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 12px;
  }
  .mock-bubble {
    padding: 8px 14px;
    border-radius: 16px;
    font-size: 11px;
    max-width: 70%;
    line-height: 1.4;
  }
  .mock-bubble.sent { align-self: flex-end; border-bottom-right-radius: 6px; }
  .mock-bubble.received { align-self: flex-start; border-bottom-left-radius: 6px; }

  .hex-row {
    display: flex;
    padding: 0 24px 20px;
    gap: 6px;
    flex-wrap: wrap;
  }
  .hex-chip {
    font-size: 10px;
    font-family: 'SF Mono', monospace;
    padding: 2px 8px;
    border-radius: 6px;
    border: 1px solid rgba(0,0,0,0.06);
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .hex-chip:hover { opacity: 0.7; }
  .hex-chip:active { transform: scale(0.95); }

  .divider { border: none; border-top: 1px solid #e5e5e5; margin: 48px 0 40px; }
  .section-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #999;
    margin-bottom: 24px;
  }
</style>
</head>
<body>

<h1>Color Palette Sandbox</h1>
<p class="subtitle">7 palettes for Message Intelligence (2 dark from references, 5 light originals). Click any hex chip to copy.</p>

<p class="section-label">From Reference Images (Dark Mode)</p>
<div class="grid" id="user-palettes"></div>

<hr class="divider">

<p class="section-label">Original Designs (Light Mode)</p>
<div class="grid" id="claude-palettes"></div>

<script>
const palettes = [
  // ── User-provided ──────────────────────────────
  {
    id: "forest",
    name: "Forest",
    desc: "Deep greens, olive, and warm cream — dark mode",
    tag: "reference · dark",
    group: "user",
    bg: "#171D22",
    card: "#1E2A28",
    fg: "#FFF2B7",
    muted: "#859659",
    accent: "#488471",
    border: "rgba(255,242,183,0.08)",
    swatches: [
      { hex: "#171D22", label: "Charcoal" },
      { hex: "#488471", label: "Teal" },
      { hex: "#859659", label: "Olive" },
      { hex: "#536649", label: "Dk Olive" },
      { hex: "#15302F", label: "Forest" },
      { hex: "#FFF2B7", label: "Cream" },
    ],
    charts: ["#488471", "#859659", "#C5CBA8", "#536649", "#FFF2B7"],
  },
  {
    id: "sage",
    name: "Sage & Navy",
    desc: "Muted sage, deep navy, warm blush — dark mode",
    tag: "reference · dark",
    group: "user",
    bg: "#1E2D4C",
    card: "#253757",
    fg: "#EFF2EE",
    muted: "#ACBDAA",
    accent: "#CEC0BB",
    border: "rgba(172,189,170,0.10)",
    swatches: [
      { hex: "#ACBDAA", label: "Sage" },
      { hex: "#1E2D4C", label: "Navy" },
      { hex: "#858585", label: "Gray" },
      { hex: "#CEC0BB", label: "Blush" },
    ],
    charts: ["#ACBDAA", "#CEC0BB", "#858585", "#D6DDD5", "#EFF2EE"],
  },

  // ── Claude-designed ────────────────────────────
  {
    id: "dusk-rose",
    name: "Dusk Rose",
    desc: "Warm editorial pinks and muted plum",
    tag: "original",
    group: "claude",
    bg: "#F5EFEF",
    card: "#FDFAFA",
    fg: "#3B1F2B",
    muted: "#7A5068",
    accent: "#C4586A",
    border: "rgba(59,31,43,0.08)",
    swatches: [
      { hex: "#3B1F2B", label: "Plum" },
      { hex: "#C4586A", label: "Rose" },
      { hex: "#7A5068", label: "Mauve" },
      { hex: "#C4A3B5", label: "Blush" },
      { hex: "#E2CDD6", label: "Petal" },
    ],
    charts: ["#3B1F2B", "#C4586A", "#7A5068", "#C4A3B5", "#E2CDD6"],
  },
  {
    id: "ocean",
    name: "Ocean",
    desc: "Deep sea blues with golden sand accent",
    tag: "original",
    group: "claude",
    bg: "#ECF0F6",
    card: "#F7F9FC",
    fg: "#1A2F4B",
    muted: "#4A6B8A",
    accent: "#D4883A",
    border: "rgba(26,47,75,0.08)",
    swatches: [
      { hex: "#1A2F4B", label: "Deep Sea" },
      { hex: "#D4883A", label: "Sand" },
      { hex: "#4A6B8A", label: "Steel" },
      { hex: "#9CB3C9", label: "Mist" },
      { hex: "#C8D5E2", label: "Foam" },
    ],
    charts: ["#1A2F4B", "#D4883A", "#4A6B8A", "#9CB3C9", "#C8D5E2"],
  },
  {
    id: "ember",
    name: "Ember",
    desc: "Warm terracotta and sunbaked earth",
    tag: "original",
    group: "claude",
    bg: "#F3ECE4",
    card: "#FBF8F4",
    fg: "#3A2010",
    muted: "#8B5E3C",
    accent: "#C4572A",
    border: "rgba(58,32,16,0.08)",
    swatches: [
      { hex: "#3A2010", label: "Earth" },
      { hex: "#C4572A", label: "Terra" },
      { hex: "#8B5E3C", label: "Sienna" },
      { hex: "#C4A882", label: "Sand" },
      { hex: "#DDD0C2", label: "Linen" },
    ],
    charts: ["#3A2010", "#C4572A", "#8B5E3C", "#C4A882", "#DDD0C2"],
  },
  {
    id: "lavender",
    name: "Lavender",
    desc: "Soft purples and tranquil violet tones",
    tag: "original",
    group: "claude",
    bg: "#EFEDF5",
    card: "#F9F8FC",
    fg: "#2B1D4A",
    muted: "#6B5A8A",
    accent: "#7B6BAF",
    border: "rgba(43,29,74,0.08)",
    swatches: [
      { hex: "#2B1D4A", label: "Violet" },
      { hex: "#7B6BAF", label: "Iris" },
      { hex: "#6B5A8A", label: "Plum" },
      { hex: "#AEA0C2", label: "Lilac" },
      { hex: "#D8D0E5", label: "Mist" },
    ],
    charts: ["#2B1D4A", "#7B6BAF", "#6B5A8A", "#AEA0C2", "#D8D0E5"],
  },
  {
    id: "arctic",
    name: "Arctic",
    desc: "Cool minimal grays with icy blue accent",
    tag: "original",
    group: "claude",
    bg: "#ECEEF2",
    card: "#F7F8FA",
    fg: "#1B2432",
    muted: "#4E5D6E",
    accent: "#3B82C4",
    border: "rgba(27,36,50,0.08)",
    swatches: [
      { hex: "#1B2432", label: "Ink" },
      { hex: "#3B82C4", label: "Ice" },
      { hex: "#4E5D6E", label: "Slate" },
      { hex: "#94A3B3", label: "Silver" },
      { hex: "#D1D5DB", label: "Frost" },
    ],
    charts: ["#1B2432", "#3B82C4", "#4E5D6E", "#94A3B3", "#D1D5DB"],
  },
];

function copyHex(hex) {
  navigator.clipboard.writeText(hex).then(() => {
    const el = document.querySelector(`[data-hex="${hex}"]`);
    if (el) {
      const orig = el.textContent;
      el.textContent = "copied!";
      setTimeout(() => el.textContent = orig, 800);
    }
  });
}

function renderPalette(p) {
  const barWidths = [72, 55, 40, 88, 63];
  return `
    <div class="palette-card" style="background:${p.bg}">
      <div class="palette-header">
        <div>
          <div class="palette-name" style="color:${p.fg}">${p.name}</div>
          <div class="palette-desc" style="color:${p.muted}">${p.desc}</div>
        </div>
        <span class="palette-tag" style="background:${p.accent}20;color:${p.accent}">${p.tag}</span>
      </div>

      <div class="swatches">
        ${p.swatches.map(s => `
          <div class="swatch" style="background:${s.hex}">
            <span class="swatch-label" style="color:${p.fg}">${s.label}</span>
          </div>
        `).join("")}
      </div>

      <div class="hex-row" style="margin-top:8px">
        ${p.swatches.map(s => `
          <span class="hex-chip" data-hex="${s.hex}" onclick="copyHex('${s.hex}')" style="background:${p.card};color:${p.fg}">${s.hex}</span>
        `).join("")}
      </div>

      <div class="mock-ui" style="background:${p.bg}">
        <div class="mock-nav" style="background:${p.card};border:1px solid ${p.border}">
          <div class="mock-nav-pill" style="background:${p.fg}15;color:${p.fg}">Chats</div>
          <div class="mock-nav-pill" style="background:${p.accent}20;color:${p.accent}">Wrapped</div>
          <div class="mock-nav-pill" style="color:${p.muted}">Search</div>
        </div>

        <div class="mock-cards">
          <div class="mock-card" style="background:${p.card};border-color:${p.border}">
            <div class="mock-card-title" style="color:${p.muted}">Messages</div>
            <div class="mock-card-value" style="color:${p.fg}">12,847</div>
            <div class="mock-bar-track" style="background:${p.muted}20">
              <div class="mock-bar-fill" style="width:${barWidths[0]}%;background:${p.charts[0]}"></div>
            </div>
          </div>
          <div class="mock-card" style="background:${p.card};border-color:${p.border}">
            <div class="mock-card-title" style="color:${p.muted}">Top Word</div>
            <div class="mock-card-value" style="color:${p.accent}">love</div>
            <div class="mock-bar-track" style="background:${p.muted}20">
              <div class="mock-bar-fill" style="width:${barWidths[1]}%;background:${p.accent}"></div>
            </div>
          </div>
        </div>

        <div class="mock-chat">
          <div class="mock-bubble sent" style="background:#007AFF;color:white">Hey, are you free this weekend?</div>
          <div class="mock-bubble received" style="background:${p.card};color:${p.fg};border:1px solid ${p.border}">Yeah! What did you have in mind?</div>
          <div class="mock-bubble sent" style="background:#007AFF;color:white">Was thinking we could check out that new place downtown</div>
        </div>
      </div>
    </div>
  `;
}

document.getElementById("user-palettes").innerHTML = palettes.filter(p => p.group === "user").map(renderPalette).join("");
document.getElementById("claude-palettes").innerHTML = palettes.filter(p => p.group === "claude").map(renderPalette).join("");
</script>
</body>
</html>
