<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
resize();window.addEventListener('resize',resize);

// ── Jellyfish ──
class Jellyfish{
  constructor(x,y,size,depth){
    this.x=x;this.y=y;this.size=size;this.depth=depth;
    this.baseX=x;this.baseY=y;
    this.phase=Math.random()*Math.PI*2;
    this.pulseSpeed=0.8+Math.random()*0.6;
    this.driftX=Math.random()*0.15-0.075;
    this.driftY=-0.1-Math.random()*0.15;
    this.hue=175+Math.random()*35; // teal-cyan range to match ocean
    this.saturation=50+Math.random()*30;
    this.tentacles=[];
    const tentCount=5+Math.floor(Math.random()*4);
    for(let i=0;i<tentCount;i++){
      this.tentacles.push({
        offsetX:(i/(tentCount-1)-0.5)*size*0.7,
        length:size*(1.5+Math.random()*2),
        segments:8+Math.floor(Math.random()*6),
        phase:Math.random()*Math.PI*2,
        amplitude:3+Math.random()*5,
        frequency:0.08+Math.random()*0.06
      });
    }
    // Oral arms (thicker, shorter, inner)
    this.oralArms=[];
    for(let i=0;i<3;i++){
      this.oralArms.push({
        offsetX:(i/2-0.5)*size*0.3,
        length:size*(0.8+Math.random()*0.6),
        phase:Math.random()*Math.PI*2,
        amplitude:4+Math.random()*3
      });
    }
  }
  update(t){
    this.x=this.baseX+Math.sin(t*0.3+this.phase)*30*this.depth;
    this.y=this.baseY+Math.cos(t*0.2+this.phase)*20*this.depth;
    this.baseX+=this.driftX*this.depth;
    this.baseY+=this.driftY*this.depth;
    // Wrap around
    if(this.baseY<-this.size*4){this.baseY=H+this.size*2;this.baseX=Math.random()*W}
    if(this.baseX<-this.size*3)this.baseX=W+this.size*2;
    if(this.baseX>W+this.size*3)this.baseX=-this.size*2;
  }
  draw(ctx,t){
    const pulse=Math.sin(t*this.pulseSpeed+this.phase);
    const bellWidth=this.size*(0.85+pulse*0.15);
    const bellHeight=this.size*(0.55+pulse*0.1);
    const alpha=0.15+this.depth*0.55;

    ctx.save();
    ctx.translate(this.x,this.y);

    // ── Outer glow ──
    const glowR=this.size*3;
    const glow=ctx.createRadialGradient(0,-bellHeight*0.2,0,0,-bellHeight*0.2,glowR);
    glow.addColorStop(0,`hsla(${this.hue},${this.saturation}%,65%,${alpha*0.08})`);
    glow.addColorStop(0.4,`hsla(${this.hue},${this.saturation}%,55%,${alpha*0.03})`);
    glow.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=glow;
    ctx.fillRect(-glowR,-glowR-bellHeight*0.2,glowR*2,glowR*2);

    // ── Bell (dome) ──
    // Outer bell
    ctx.beginPath();
    ctx.moveTo(-bellWidth,0);
    ctx.bezierCurveTo(-bellWidth,-bellHeight*0.8,-bellWidth*0.6,-bellHeight*1.6,0,-bellHeight*1.5);
    ctx.bezierCurveTo(bellWidth*0.6,-bellHeight*1.6,bellWidth,-bellHeight*0.8,bellWidth,0);
    // Scalloped edge
    const scallops=8;
    for(let i=scallops;i>=0;i--){
      const sx=(i/scallops)*2-1;
      const sEdge=sx*bellWidth;
      const sDepth=Math.sin(i*Math.PI/scallops*2+t*2+this.phase)*3;
      ctx.lineTo(sEdge,sDepth+(1-Math.abs(sx))*5);
    }
    ctx.closePath();

    // Bell gradient (translucent, glowing)
    const bellG=ctx.createRadialGradient(0,-bellHeight*0.5,0,0,-bellHeight*0.5,bellWidth*1.2);
    bellG.addColorStop(0,`hsla(${this.hue},${this.saturation+10}%,75%,${alpha*0.45})`);
    bellG.addColorStop(0.4,`hsla(${this.hue},${this.saturation}%,60%,${alpha*0.3})`);
    bellG.addColorStop(0.8,`hsla(${this.hue},${this.saturation-10}%,50%,${alpha*0.15})`);
    bellG.addColorStop(1,`hsla(${this.hue},${this.saturation}%,45%,${alpha*0.05})`);
    ctx.fillStyle=bellG;
    ctx.fill();

    // Bell rim highlight
    ctx.beginPath();
    ctx.moveTo(-bellWidth*0.95,2);
    ctx.bezierCurveTo(-bellWidth*0.7,-bellHeight*0.3,bellWidth*0.7,-bellHeight*0.3,bellWidth*0.95,2);
    ctx.strokeStyle=`hsla(${this.hue},${this.saturation+15}%,80%,${alpha*0.2})`;
    ctx.lineWidth=1.5;
    ctx.stroke();

    // Inner bell structure (radial lines)
    ctx.save();
    ctx.globalAlpha=alpha*0.08;
    for(let i=0;i<8;i++){
      const angle=(i/8)*Math.PI-Math.PI/2;
      ctx.beginPath();
      ctx.moveTo(0,0);
      ctx.lineTo(Math.cos(angle)*bellWidth*0.8,Math.sin(angle)*bellHeight*0.8-bellHeight*0.5);
      ctx.strokeStyle=`hsla(${this.hue},60%,70%,1)`;
      ctx.lineWidth=0.8;
      ctx.stroke();
    }
    ctx.restore();

    // Inner glow (the bioluminescent center)
    const innerG=ctx.createRadialGradient(0,-bellHeight*0.6,0,0,-bellHeight*0.6,bellWidth*0.5);
    innerG.addColorStop(0,`hsla(${this.hue+20},70%,85%,${alpha*0.25*(0.7+pulse*0.3)})`);
    innerG.addColorStop(0.5,`hsla(${this.hue+10},60%,70%,${alpha*0.1})`);
    innerG.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=innerG;
    ctx.beginPath();ctx.ellipse(0,-bellHeight*0.6,bellWidth*0.5,bellHeight*0.4,0,0,Math.PI*2);
    ctx.fill();

    // ── Oral arms (thick, ruffled, inner) ──
    this.oralArms.forEach(arm=>{
      ctx.beginPath();
      ctx.moveTo(arm.offsetX,5);
      const armLen=arm.length*(0.9+pulse*0.1);
      for(let s=0;s<armLen;s+=2){
        const progress=s/armLen;
        const sway=Math.sin(t*1.5+s*0.05+arm.phase)*arm.amplitude*(1+progress);
        const ruffle=Math.sin(s*0.3+t*2)*2*progress;
        ctx.lineTo(arm.offsetX+sway+ruffle,5+s);
      }
      ctx.strokeStyle=`hsla(${this.hue},${this.saturation}%,70%,${alpha*0.2*(1-0)})`;
      ctx.lineWidth=2+Math.random();
      ctx.stroke();
    });

    // ── Tentacles (thin, flowing, long) ──
    this.tentacles.forEach(tent=>{
      ctx.beginPath();
      ctx.moveTo(tent.offsetX,5);
      const tLen=tent.length*(0.9+pulse*0.1);
      for(let s=0;s<tent.segments;s++){
        const progress=s/tent.segments;
        const segLen=tLen/tent.segments;
        const sway=Math.sin(t*1.2+s*tent.frequency*10+tent.phase)*tent.amplitude*(1+progress*2);
        const x=tent.offsetX+sway;
        const y=5+s*segLen;
        if(s===0)ctx.moveTo(x,y);
        else ctx.lineTo(x,y);
      }
      const tentAlpha=alpha*0.18;
      ctx.strokeStyle=`hsla(${this.hue},${this.saturation-10}%,70%,${tentAlpha})`;
      ctx.lineWidth=0.6+this.depth*0.5;
      ctx.stroke();

      // Bioluminescent dots along tentacles
      for(let s=1;s<tent.segments;s+=2){
        const progress=s/tent.segments;
        const segLen=tLen/tent.segments;
        const sway=Math.sin(t*1.2+s*tent.frequency*10+tent.phase)*tent.amplitude*(1+progress*2);
        const dx=tent.offsetX+sway;
        const dy=5+s*segLen;
        const dotAlpha=alpha*0.3*(0.5+0.5*Math.sin(t*2+s+tent.phase));
        ctx.beginPath();ctx.arc(dx,dy,1+this.depth,0,Math.PI*2);
        ctx.fillStyle=`hsla(${this.hue+20},70%,80%,${dotAlpha})`;
        ctx.fill();
      }
    });

    ctx.restore();
  }
}

// ── Particles (plankton, sediment, light motes) ──
class Particle{
  constructor(){this.reset(true)}
  reset(init){
    this.x=Math.random()*W;
    this.y=init?Math.random()*H:H+10;
    this.r=0.5+Math.random()*2;
    this.speed=0.1+Math.random()*0.3;
    this.drift=Math.random()*0.3-0.15;
    this.phase=Math.random()*Math.PI*2;
    this.brightness=Math.random();
    this.type=Math.random()>0.7?'bright':'dim';
  }
  update(t){
    this.y-=this.speed;
    this.x+=this.drift+Math.sin(t*0.5+this.phase)*0.3;
    if(this.y<-10)this.reset(false);
  }
  draw(ctx,t){
    const flicker=0.5+0.5*Math.sin(t*1.5+this.phase);
    if(this.type==='bright'){
      const a=this.brightness*flicker*0.4;
      const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r*4);
      g.addColorStop(0,`rgba(140,220,210,${a*0.35})`);
      g.addColorStop(1,'rgba(120,200,195,0)');
      ctx.fillStyle=g;
      ctx.fillRect(this.x-this.r*4,this.y-this.r*4,this.r*8,this.r*8);
    }
    ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    const a2=this.type==='bright'?this.brightness*flicker*0.45:this.brightness*0.1;
    ctx.fillStyle=this.type==='bright'?`rgba(160,225,215,${a2})`:`rgba(90,155,160,${a2})`;
    ctx.fill();
  }
}

// ── Bubbles ──
class Bubble{
  constructor(){this.reset(true)}
  reset(init){
    this.x=Math.random()*W;
    this.y=init?Math.random()*H:H+20;
    this.r=2+Math.random()*6;
    this.speed=0.4+Math.random()*0.8;
    this.wobble=Math.random()*Math.PI*2;
    this.wobbleAmp=0.5+Math.random()*1.5;
  }
  update(t){
    this.y-=this.speed;
    this.x+=Math.sin(t*0.8+this.wobble)*this.wobbleAmp;
    if(this.y<-20)this.reset(false);
  }
  draw(ctx,t){
    // Bubble outline
    ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.strokeStyle=`rgba(140,215,210,${0.07+this.r*0.008})`;
    ctx.lineWidth=0.5;ctx.stroke();
    // Specular highlight
    ctx.beginPath();ctx.arc(this.x-this.r*0.3,this.y-this.r*0.3,this.r*0.25,0,Math.PI*2);
    ctx.fillStyle=`rgba(190,240,235,${0.08+this.r*0.012})`;
    ctx.fill();
    // Bottom rim catch
    ctx.beginPath();ctx.arc(this.x+this.r*0.15,this.y+this.r*0.35,this.r*0.15,0,Math.PI*2);
    ctx.fillStyle=`rgba(170,230,225,${0.04})`;
    ctx.fill();
  }
}

// ── Mouse tracking ──
let mouseX=W/2,mouseY=H/2;
document.addEventListener('mousemove',e=>{mouseX=e.clientX;mouseY=e.clientY});

// ── Angler Fish ──
class AnglerFish{
  constructor(){
    this.x=W/2;this.y=H/2;
    this.targetX=W/2;this.targetY=H/2;
    this.angle=0;
    this.targetAngle=0;
    this.jawOpen=0;
    this.tailPhase=0;
    this.size=40;
    this.lureSwing=0;
    this.lureBrightness=0.7;
  }
  update(t){
    // Offset target so the lure tip reaches the cursor, not the body center
    const offsetDist=this.size*2;
    const dxRaw=mouseX-this.x;
    const dyRaw=mouseY-this.y;
    const dist=Math.sqrt(dxRaw*dxRaw+dyRaw*dyRaw)||1;
    this.targetX=mouseX-(dxRaw/dist)*offsetDist;
    this.targetY=mouseY-(dyRaw/dist)*offsetDist;
    // Slow follow (lerp)
    const ease=0.012;
    this.x+=(this.targetX-this.x)*ease;
    this.y+=(this.targetY-this.y)*ease;
    // Face toward target
    const dx=mouseX-this.x;
    const dy=mouseY-this.y;
    this.targetAngle=Math.atan2(dy,dx);
    // Smooth angle rotation
    let angleDiff=this.targetAngle-this.angle;
    while(angleDiff>Math.PI)angleDiff-=Math.PI*2;
    while(angleDiff<-Math.PI)angleDiff+=Math.PI*2;
    this.angle+=angleDiff*0.02;
    // Tail swimming motion
    this.tailPhase=t*2;
    // Jaw subtle open/close
    this.jawOpen=0.05+0.03*Math.sin(t*1.5);
    // Lure swing
    this.lureSwing=Math.sin(t*1.2)*0.3;
    // Lure brightness pulse
    this.lureBrightness=0.5+0.3*Math.sin(t*2)+0.2*Math.sin(t*3.7);
  }
  draw(ctx,t){
    ctx.save();
    ctx.translate(this.x,this.y);
    ctx.rotate(this.angle);

    const S=this.size;

    // ── LURE ILLUMINATION (the key effect — lights up surroundings) ──
    // The lure extends from the head forward and up
    const lureBaseX=S*0.6;
    const lureBaseY=-S*0.3;
    const lureTipX=S*1.4+Math.sin(t*1.2)*S*0.15;
    const lureTipY=-S*0.9+Math.cos(t*0.9)*S*0.1;

    // Large ambient light from lure
    const ambR=S*5;
    const amb=ctx.createRadialGradient(lureTipX,lureTipY,0,lureTipX,lureTipY,ambR);
    amb.addColorStop(0,`rgba(100,220,255,${this.lureBrightness*0.08})`);
    amb.addColorStop(0.15,`rgba(80,200,240,${this.lureBrightness*0.05})`);
    amb.addColorStop(0.4,`rgba(60,160,220,${this.lureBrightness*0.02})`);
    amb.addColorStop(1,'rgba(40,120,200,0)');
    ctx.fillStyle=amb;
    ctx.fillRect(lureTipX-ambR,lureTipY-ambR,ambR*2,ambR*2);

    // Medium glow
    const medR=S*2.5;
    const med=ctx.createRadialGradient(lureTipX,lureTipY,0,lureTipX,lureTipY,medR);
    med.addColorStop(0,`rgba(150,240,255,${this.lureBrightness*0.15})`);
    med.addColorStop(0.3,`rgba(120,210,250,${this.lureBrightness*0.06})`);
    med.addColorStop(1,'rgba(80,180,240,0)');
    ctx.fillStyle=med;
    ctx.fillRect(lureTipX-medR,lureTipY-medR,medR*2,medR*2);

    // ── BODY ──
    // Main body shape (bulbous front, tapers back)
    ctx.beginPath();
    // Top line
    ctx.moveTo(-S*1.2,0);
    ctx.bezierCurveTo(-S*0.8,-S*0.15,-S*0.3,-S*0.35,S*0.1,-S*0.4);
    ctx.bezierCurveTo(S*0.4,-S*0.42,S*0.6,-S*0.3,S*0.7,-S*0.15);
    // Front/mouth area
    ctx.bezierCurveTo(S*0.75,-S*0.05,S*0.75,S*0.05,S*0.7,S*0.15);
    // Bottom line
    ctx.bezierCurveTo(S*0.6,S*0.35,S*0.3,S*0.45,S*0.1,S*0.42);
    ctx.bezierCurveTo(-S*0.3,S*0.38,-S*0.8,S*0.15,-S*1.2,0);
    ctx.closePath();

    // Body gradient (dark with subtle bioluminescence)
    const bodyG=ctx.createLinearGradient(-S*1.2,-S*0.4,S*0.7,S*0.4);
    bodyG.addColorStop(0,'rgba(15,25,40,0.85)');
    bodyG.addColorStop(0.4,'rgba(20,35,55,0.8)');
    bodyG.addColorStop(0.7,'rgba(25,40,60,0.75)');
    bodyG.addColorStop(1,'rgba(18,30,48,0.8)');
    ctx.fillStyle=bodyG;
    ctx.fill();

    // Body edge highlight (subtle rim light from lure)
    ctx.strokeStyle=`rgba(80,160,220,${this.lureBrightness*0.12})`;
    ctx.lineWidth=1;
    ctx.stroke();

    // ── FINS ──
    // Dorsal fin
    const dorsalWave=Math.sin(this.tailPhase)*0.15;
    ctx.beginPath();
    ctx.moveTo(-S*0.3,-S*0.35);
    ctx.quadraticCurveTo(-S*0.1,-S*0.55+dorsalWave*S,S*0.2,-S*0.38);
    ctx.strokeStyle='rgba(20,40,60,0.5)';ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle='rgba(18,35,55,0.4)';ctx.fill();

    // Pectoral fins (animated)
    const finWave=Math.sin(this.tailPhase*1.5)*0.2;
    // Top pectoral
    ctx.beginPath();
    ctx.moveTo(S*0.1,-S*0.2);
    ctx.quadraticCurveTo(S*0.05+finWave*S,-S*0.5,-S*0.2,-S*0.35+finWave*S*0.5);
    ctx.strokeStyle='rgba(25,45,65,0.35)';ctx.lineWidth=1;ctx.stroke();
    // Bottom pectoral
    ctx.beginPath();
    ctx.moveTo(S*0.1,S*0.2);
    ctx.quadraticCurveTo(S*0.05-finWave*S,S*0.5,-S*0.2,S*0.35-finWave*S*0.5);
    ctx.stroke();

    // ── TAIL (animated swimming motion) ──
    const tailSwing=Math.sin(this.tailPhase)*S*0.2;
    ctx.beginPath();
    ctx.moveTo(-S*1.1,-S*0.05);
    ctx.quadraticCurveTo(-S*1.4,tailSwing*0.5,-S*1.7,tailSwing);
    ctx.quadraticCurveTo(-S*1.5,0,-S*1.7,-tailSwing*0.6);
    ctx.quadraticCurveTo(-S*1.4,-tailSwing*0.3,-S*1.1,S*0.05);
    ctx.fillStyle='rgba(18,32,50,0.6)';ctx.fill();
    ctx.strokeStyle='rgba(60,120,180,0.08)';ctx.lineWidth=0.8;ctx.stroke();

    // ── MOUTH (slightly open, with teeth) ──
    const jawAngle=this.jawOpen;
    // Upper jaw
    ctx.beginPath();
    ctx.moveTo(S*0.5,-S*0.02);
    ctx.lineTo(S*0.78,-S*0.08-jawAngle*S*0.5);
    ctx.lineTo(S*0.7,-S*0.15);
    ctx.fillStyle='rgba(10,15,25,0.9)';ctx.fill();
    // Lower jaw
    ctx.beginPath();
    ctx.moveTo(S*0.5,S*0.02);
    ctx.lineTo(S*0.78,S*0.08+jawAngle*S*0.5);
    ctx.lineTo(S*0.7,S*0.15);
    ctx.fill();
    // Teeth (small, sharp, pointing inward)
    ctx.fillStyle=`rgba(180,200,220,${0.3+this.lureBrightness*0.1})`;
    for(let i=0;i<5;i++){
      const tx=S*0.52+i*S*0.05;
      const tSize=2+Math.random()*2;
      // Upper teeth
      ctx.beginPath();
      ctx.moveTo(tx,-S*0.02-jawAngle*S*i*0.08);
      ctx.lineTo(tx+1,S*0.04-jawAngle*S*i*0.06);
      ctx.lineTo(tx-1,S*0.04-jawAngle*S*i*0.06);
      ctx.fill();
      // Lower teeth
      ctx.beginPath();
      ctx.moveTo(tx,S*0.02+jawAngle*S*i*0.08);
      ctx.lineTo(tx+1,-S*0.04+jawAngle*S*i*0.06);
      ctx.lineTo(tx-1,-S*0.04+jawAngle*S*i*0.06);
      ctx.fill();
    }

    // ── EYE ──
    // Eye socket
    ctx.beginPath();ctx.arc(S*0.35,-S*0.15,S*0.08,0,Math.PI*2);
    ctx.fillStyle='rgba(5,10,18,0.9)';ctx.fill();
    // Iris
    ctx.beginPath();ctx.arc(S*0.36,-S*0.15,S*0.05,0,Math.PI*2);
    ctx.fillStyle=`rgba(60,180,200,${0.4+this.lureBrightness*0.15})`;ctx.fill();
    // Pupil
    ctx.beginPath();ctx.arc(S*0.37,-S*0.15,S*0.025,0,Math.PI*2);
    ctx.fillStyle='rgba(5,10,15,0.95)';ctx.fill();
    // Eye glint
    ctx.beginPath();ctx.arc(S*0.34,-S*0.17,S*0.012,0,Math.PI*2);
    ctx.fillStyle=`rgba(200,240,255,${0.4+this.lureBrightness*0.2})`;ctx.fill();

    // ── LURE STALK (illicium) ──
    ctx.beginPath();
    ctx.moveTo(lureBaseX,lureBaseY);
    // Curved stalk
    const stalkMidX=(lureBaseX+lureTipX)/2+Math.sin(t*0.8)*S*0.08;
    const stalkMidY=(lureBaseY+lureTipY)/2+Math.cos(t*1.1)*S*0.06;
    ctx.quadraticCurveTo(stalkMidX,stalkMidY,lureTipX,lureTipY);
    ctx.strokeStyle=`rgba(40,70,90,0.5)`;
    ctx.lineWidth=1.5;ctx.stroke();

    // ── LURE BULB (esca) — the glowing light ──
    // Outer glow
    const lureR=S*0.12;
    const lureG=ctx.createRadialGradient(lureTipX,lureTipY,0,lureTipX,lureTipY,lureR*4);
    lureG.addColorStop(0,`rgba(140,240,255,${this.lureBrightness*0.35})`);
    lureG.addColorStop(0.3,`rgba(100,210,250,${this.lureBrightness*0.15})`);
    lureG.addColorStop(0.6,`rgba(70,180,240,${this.lureBrightness*0.05})`);
    lureG.addColorStop(1,'rgba(50,150,220,0)');
    ctx.fillStyle=lureG;
    ctx.fillRect(lureTipX-lureR*4,lureTipY-lureR*4,lureR*8,lureR*8);
    // Bulb core
    ctx.beginPath();ctx.arc(lureTipX,lureTipY,lureR,0,Math.PI*2);
    ctx.fillStyle=`rgba(180,250,255,${this.lureBrightness*0.6})`;ctx.fill();
    // Bright center
    ctx.beginPath();ctx.arc(lureTipX,lureTipY,lureR*0.5,0,Math.PI*2);
    ctx.fillStyle=`rgba(220,255,255,${this.lureBrightness*0.8})`;ctx.fill();
    // Hot spot
    ctx.beginPath();ctx.arc(lureTipX,lureTipY,lureR*0.2,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${this.lureBrightness*0.9})`;ctx.fill();

    ctx.restore();
  }
  // Draw the illumination effect at the cursor position
  drawIllumination(ctx,t){
    const bigR=this.size*8;
    const big=ctx.createRadialGradient(mouseX,mouseY,0,mouseX,mouseY,bigR);
    big.addColorStop(0,`rgba(80,200,220,${this.lureBrightness*0.045})`);
    big.addColorStop(0.2,`rgba(60,170,200,${this.lureBrightness*0.028})`);
    big.addColorStop(0.5,`rgba(40,130,180,${this.lureBrightness*0.012})`);
    big.addColorStop(1,'rgba(20,80,140,0)');
    ctx.fillStyle=big;
    ctx.fillRect(mouseX-bigR,mouseY-bigR,bigR*2,bigR*2);
  }
}

const angler=new AnglerFish();

// ── Create scene ──
const jellyfish=[];
// Background jellies (small, faint)
for(let i=0;i<6;i++){
  jellyfish.push(new Jellyfish(
    Math.random()*W,Math.random()*H,
    15+Math.random()*20,0.2+Math.random()*0.2
  ));
}
// Midground jellies
for(let i=0;i<4;i++){
  jellyfish.push(new Jellyfish(
    Math.random()*W,Math.random()*H,
    30+Math.random()*30,0.4+Math.random()*0.2
  ));
}
// Foreground jellies (large, vivid)
for(let i=0;i<3;i++){
  jellyfish.push(new Jellyfish(
    W*0.2+Math.random()*W*0.6,H*0.2+Math.random()*H*0.5,
    50+Math.random()*40,0.7+Math.random()*0.3
  ));
}

const particles=[];for(let i=0;i<120;i++)particles.push(new Particle());
const bubbles=[];for(let i=0;i<20;i++)bubbles.push(new Bubble());

// Sort by depth for proper layering
jellyfish.sort((a,b)=>a.depth-b.depth);

function draw(){
  const t=performance.now()/1000;
  ctx.clearRect(0,0,W,H);

  // ── OCEAN GRADIENT (darker, less saturated teal) ──
  const ocean=ctx.createLinearGradient(0,0,0,H);
  ocean.addColorStop(0.00,'#165858');
  ocean.addColorStop(0.08,'#124A4A');
  ocean.addColorStop(0.18,'#0F4042');
  ocean.addColorStop(0.30,'#0C3538');
  ocean.addColorStop(0.45,'#0A2C32');
  ocean.addColorStop(0.60,'#08242C');
  ocean.addColorStop(0.75,'#061E26');
  ocean.addColorStop(0.90,'#051820');
  ocean.addColorStop(1.00,'#03121A');
  ctx.fillStyle=ocean;
  ctx.fillRect(0,0,W,H);

  // ── BRIGHT ZONE near surface (subtler) ──
  const brightZone=ctx.createLinearGradient(0,0,0,H*0.3);
  brightZone.addColorStop(0,'rgba(100,190,180,0.07)');
  brightZone.addColorStop(0.15,'rgba(85,175,170,0.08)');
  brightZone.addColorStop(0.35,'rgba(60,150,150,0.04)');
  brightZone.addColorStop(1,'rgba(30,110,120,0)');
  ctx.fillStyle=brightZone;
  ctx.fillRect(0,0,W,H*0.3);

  // ── SUNLIGHT — soft diffuse glow, not sharp beams ──
  // A few very wide, very soft light columns that drift gently
  ctx.save();
  for(let i=0;i<4;i++){
    const baseX=W*0.15+i*(W*0.7/3);
    const sway=Math.sin(t*0.12+i*2.1)*25+Math.sin(t*0.07+i*1.3)*15;
    const rx=baseX+sway;
    const rw=W*0.12+W*0.04*Math.sin(t*0.18+i*0.7);
    const intensity=0.018+0.006*Math.sin(t*0.2+i*1.4)+0.003*Math.sin(t*0.9+i*2.8);

    const ray=ctx.createLinearGradient(rx,0,rx+W*0.05,H);
    ray.addColorStop(0,`rgba(160,230,220,${intensity*1.8})`);
    ray.addColorStop(0.1,`rgba(130,210,205,${intensity*1.2})`);
    ray.addColorStop(0.3,`rgba(100,185,185,${intensity*0.6})`);
    ray.addColorStop(0.55,`rgba(70,155,165,${intensity*0.2})`);
    ray.addColorStop(1,'rgba(40,120,140,0)');

    ctx.fillStyle=ray;
    ctx.beginPath();
    ctx.moveTo(rx-rw,0);
    ctx.lineTo(rx+rw,0);
    ctx.lineTo(rx+rw*1.5+W*0.06,H);
    ctx.lineTo(rx-rw*0.5+W*0.06,H);
    ctx.fill();
  }
  ctx.restore();

  // ── Particles (background) ──
  particles.forEach(p=>{p.update(t);p.draw(ctx,t)});

  // ── Jellyfish ──
  jellyfish.forEach(j=>{j.update(t);j.draw(ctx,t)});

  // ── Angler fish illumination (drawn before the fish so it lights surroundings) ──
  angler.update(t);
  angler.drawIllumination(ctx,t);
  angler.draw(ctx,t);

  // ── Bubbles (foreground) ──
  bubbles.forEach(b=>{b.update(t);b.draw(ctx,t)});

  // ── Depth fog (darkens bottom) ──
  const fog=ctx.createLinearGradient(0,H*0.6,0,H);
  fog.addColorStop(0,'rgba(3,14,22,0)');
  fog.addColorStop(0.5,'rgba(3,12,20,0.25)');
  fog.addColorStop(1,'rgba(3,10,16,0.5)');
  ctx.fillStyle=fog;
  ctx.fillRect(0,H*0.6,W,H*0.4);

  // ── Subtle vignette ──
  const vig=ctx.createRadialGradient(W/2,H*0.35,W*0.3,W/2,H*0.35,W*0.8);
  vig.addColorStop(0,'rgba(0,0,0,0)');
  vig.addColorStop(1,'rgba(2,10,16,0.3)');
  ctx.fillStyle=vig;
  ctx.fillRect(0,0,W,H);

  requestAnimationFrame(draw);
}
draw();
</script>
